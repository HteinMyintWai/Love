<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Love Question</title>
    <style>
        body {
            background-color: #e6f2ff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: auto;
            min-height: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        #love-box {
            display: none;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
        }

        /* 🟢 Firebase Indicator */
        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #ff3b30; 
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
            transition: all 0.4s ease;
            position: relative;
        }
        .status-dot.connected {
            background-color: #34c759; 
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.8);
        }
        .status-dot::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: inherit;
            opacity: 0.4;
            animation: pulse 1.8s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .btn-home, .btn-settings, .btn-outline {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }

        /* 🏡 ပင်မခလုတ် */
        .btn-home {
            display: none; 
            background: #ffffff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 20px;
        }

        /* ⚙️ Settings ခလုတ် */
        .btn-settings {
            background: #ffffff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 20px;
        }
        
        .settings-panel {
            display: none;
            position: fixed;
            top: 75px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 9998;
            width: 260px;
            font-size: 13px;
        }
        .settings-panel h4 { margin: 0 0 10px 0; color: #2b2d42; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        .audio-group { margin-bottom: 10px; text-align: left; }
        .audio-group label { display: block; margin-bottom: 3px; font-weight: bold; color: #555; }
        .audio-group input { width: 100%; font-size: 11px; }
        .status-msg { font-size: 11px; color: #28a745; margin-top: 5px; display: none; }

        .gif-container {
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            width: 180px;  
            height: 180px; 
            display: block;
        }

        #waiting-gif-box { display: block; }
        .gif-surprise { display: none; }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            color: #2b2d42;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }

        .result-text {
            display: none; 
            font-size: 17px;
            font-weight: bold;
            margin-top: 25px; 
            line-height: 1.6;
        }

        #sweet-text { color: #ff758c; }
        #joke-text { color: #e60033; }

        .btn-outline {
            background: #ffffff;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .btn-main { border: 2px solid #0056b3; color: #0056b3; }
        .buttons-row { display: flex; gap: 15px; justify-content: center; width: 100%; margin-top: 10px; }
        .btn-love { border: 2px solid #007bff; color: #007bff; }
        .btn-not-love { border: 2px solid #6c757d; color: #6c757d; }

        .btn-outline:active {
            transform: scale(0.95);
        }

        .particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatOutSlow 1.5s forwards;
        }
        @keyframes floatOutSlow {
            0% { transform: scale(0.5); opacity: 0; }
            15% { opacity: 1; transform: scale(1.2); }
            100% { transform: translate(var(--x), var(--y)) scale(0.4); opacity: 0; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="top-controls">
        <div class="status-dot" id="db-status-dot" title="Connecting..."></div>
        <button type="button" class="btn-settings" onclick="toggleSettings()" title="သီချင်းရွေးရန်">⚙️</button>
        <button type="button" class="btn-home" id="home-button" onclick="goBackToMain()" title="ပင်မစာမျက်နှာသို့">🏡</button>
    </div>

    <div class="settings-panel" id="settings-panel">
        <h4>သီချင်းရွေးချယ်ရန် 🎵</h4>
        <div class="audio-group">
            <label>ပင်မနောက်ခံသီချင်း:</label>
            <input type="file" accept="audio/*" onchange="uploadAudio(this, 'main')">
        </div>
        <div class="audio-group">
            <label>"အရမ်းချစ်တယ်" သီချင်း:</label>
            <input type="file" accept="audio/*" onchange="uploadAudio(this, 'love')">
        </div>
        <div class="audio-group">
            <label>"မချစ်ဖူး" သီချင်း:</label>
            <input type="file" accept="audio/*" onchange="uploadAudio(this, 'not-love')">
        </div>
        <div class="status-msg" id="upload-status">Firebase သို့ သိမ်းဆည်းနေပါသည်... 💾</div>
    </div>

    <audio id="audio-main" loop></audio>
    <audio id="audio-love"></audio>
    <audio id="audio-not-love"></audio>

    <div class="wrapper">
        <div class="page-section" id="main-section">
            <div class="gif-container">
                <div class="tenor-gif-embed" data-postid="7562928744613497012" data-width="100%"></div>
            </div>
            <div class="question-text">ကျွန်တော်ခဗျားလေးကိုမေးစရာရှိလို့...</div>
            <button type="button" class="btn-outline btn-main" onclick="showLoveButtons()">ဘာမေးမှာလဲ နှိပ်ကြည့်မယ်</button>
        </div>

        <div class="page-section" id="love-box">
            <div class="gif-container" id="waiting-gif-box">
                <div class="tenor-gif-embed" data-postid="14531661802041862698" data-width="100%"></div>
            </div>
            <div class="gif-container gif-surprise" id="happy-gif-box">
                <div class="tenor-gif-embed" data-postid="8604663346218614199" data-width="100%"></div>
            </div>
            <div class="gif-container gif-surprise" id="sad-gif-box">
                <div class="tenor-gif-embed" data-postid="4822939937925547997" data-width="100%"></div>
            </div>
            
            <div class="buttons-row" id="choice-buttons">
                <button type="button" class="btn-outline btn-love" onclick="playLoveEffect(event)">အရမ်းချစ်တယ်</button>
                <button type="button" class="btn-outline btn-not-love" onclick="playAngryEffect(event)">မချစ်ဖူး</button>
            </div>

            <div class="result-text" id="sweet-text">တစ်သက်လုံး ထာဝရချစ်သွားမှာပါ ချစ်ရတဲ့သူလေးရယ် 🥰💖</div>
            <div class="result-text" id="joke-text">မချစ်ဖူးနှိပ်တယ်ပေါ့ ပါရိုက်ခံချင်နေတာလား 😤👊</div>
        </div>
    </div>

    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

    <script>
        // ⚠️ love-kho Project Config
        const firebaseConfig = {
            apiKey: "AIzaSyCz-uMdt2UvHRbfV10_oQJTaBieWasPqKk",
            authDomain: "love-kho.firebaseapp.com",
            projectId: "love-kho",
            storageBucket: "love-kho.firebasestorage.app",
            messagingSenderId: "700127361376",
            appId: "1:700127361376:web:7074c4367f2f87db518605",
            measurementId: "G-MEBRQX063E",
            databaseURL: "https://love-kho-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const mainSection = document.getElementById('main-section');
        const loveBox = document.getElementById('love-box');
        const waitingGif = document.getElementById('waiting-gif-box');
        const happyGif = document.getElementById('happy-gif-box');
        const sadGif = document.getElementById('sad-gif-box');
        const choiceButtons = document.getElementById('choice-buttons');
        const sweetText = document.getElementById('sweet-text');
        const jokeText = document.getElementById('joke-text');
        const homeButton = document.getElementById('home-button');
        const settingsPanel = document.getElementById('settings-panel');
        const uploadStatus = document.getElementById('upload-status');
        const dbStatusDot = document.getElementById('db-status-dot');

        const audioMain = document.getElementById('audio-main');
        const audioLove = document.getElementById('audio-love');
        const audioNotLove = document.getElementById('audio-not-love');

        // မီးစိမ်းရန် စောင့်ကြည့်ခြင်း
        database.ref('.info/connected').on('value', (snapshot) => {
            if (snapshot.val() === true) {
                dbStatusDot.classList.add('connected');
                database.ref('audioTracks').once('value', (snap) => {
                    if (!snap.exists()) database.ref('audioTracks').set({ init: "true" });
                });
            } else {
                dbStatusDot.classList.remove('connected');
            }
        });

        database.ref('audioTracks').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.main) audioMain.src = data.main;
                if (data.love) audioLove.src = data.love;
                if (data.notLove) audioNotLove.src = data.notLove;
            }
        });

        function toggleSettings() {
            settingsPanel.style.display = (settingsPanel.style.display === 'block') ? 'none' : 'block';
        }

        function showLoveButtons() {
            mainSection.style.display = 'none';
            loveBox.style.display = 'flex';
            waitingGif.style.display = 'block';
            happyGif.style.display = 'none';
            sadGif.style.display = 'none';
            choiceButtons.style.display = 'flex';
            sweetText.style.display = 'none';
            jokeText.style.display = 'none';
            homeButton.style.display = 'none';
            if(audioMain.src) audioMain.play().catch(e => {});
        }

        function goBackToMain() {
            loveBox.style.display = 'none';
            mainSection.style.display = 'flex';
            homeButton.style.display = 'none'; 
            audioLove.pause(); audioNotLove.pause();
            if(audioMain.src) audioMain.play().catch(e => {});
        }

        // 💖 "အရမ်းချစ်တယ်" ကို နှိပ်လျှင် - တခြားအကျိုးသက်ရောက်မှုဟောင်းများကို အကုန်ရှင်းလင်းပြီးမှ အသစ်ပြမည်
        function playLoveEffect(e) {
            waitingGif.style.display = 'none'; 
            sadGif.style.display = 'none'; // စိတ်ဆိုးတဲ့ GIF ဖျောက်မယ်
            jokeText.style.display = 'none';   // မချစ်ဖူး စာသားဖျောက်မယ်
            
            happyGif.style.display = 'block'; // ပျော်တဲ့ GIF ပြမယ်
            sweetText.style.display = 'block'; // အချစ်စာသား ပြမယ်
            homeButton.style.display = 'flex'; 
            
            audioMain.pause(); audioNotLove.pause();
            if(audioLove.src) audioLove.play().catch(e => {});
            createHearts(e);
        }

        // 👊 "မချစ်ဖူး" ကို နှိပ်လျှင် - အချစ် Effect ဟောင်းများကို အကုန်ပြန်ဖျောက်ပြီးမှ စိတ်ဆိုးပြမည်
        function playAngryEffect(e) {
            waitingGif.style.display = 'none'; 
            happyGif.style.display = 'none'; // ပျော်တဲ့ GIF ဖျောက်မယ်
            sweetText.style.display = 'none'; // အချစ်စာသား ဖျောက်မယ်
            
            sadGif.style.display = 'block';  // စိတ်ဆိုးတဲ့ GIF ပြမယ်
            jokeText.style.display = 'block'; // မချစ်ဖူး စာသား ပြမယ်
            homeButton.style.display = 'flex'; 
            
            audioMain.pause(); audioLove.pause();
            if(audioNotLove.src) audioNotLove.play().catch(e => {});
        }

        function createHearts(e) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.classList.add('particle'); p.innerText = '💖';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px');
                p.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        function uploadAudio(input, trackType) {
            if (!input.files || !input.files[0]) return;
            uploadStatus.style.display = 'block';
            uploadStatus.innerText = "Firebase သို့ သိမ်းဆည်းနေပါသည်... 💾";
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                database.ref('audioTracks/' + trackType).set(e.target.result)
                .then(() => {
                    uploadStatus.innerText = "အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ! 🎉";
                    setTimeout(() => uploadStatus.style.display = 'none', 2000);
                })
                .catch(err => {
                    uploadStatus.innerText = "Error: " + err.message;
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
