<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>For My Love</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #ffe6e6; padding-top: 100px; }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #d63384; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 10px; transition: 0.3s; }
        #yesBtn { background-color: #28a745; color: white; }
        #noBtn { background-color: #dc3545; color: white; position: absolute; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://media.tenor.com/images/8f01c876b668f4477c72f4414c514867/tenor.gif" width="200">
    <h1>ကိုယ်နဲ့တွဲပေးမလား?</h1>
    <button id="yesBtn" class="btn" onclick="alert('ချစ်တယ်နော်! ❤️')">ဟုတ်ကဲ့၊ တွဲမယ်</button>
    <button id="noBtn" class="btn" onmouseover="moveNo()">မတွဲဘူး</button>
</div>

<script>
    function moveNo() {
        const btn = document.getElementById('noBtn');
        btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        btn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
    }
</script>

</body>
</html>
