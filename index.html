<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Love Question</title>
    <style>
        body {
            background-color: #e6f2ff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        #love-box {
            display: none;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
        }

        /* 🏡 ပင်မခလုတ် */
        .btn-home {
            display: none; 
            background: #ffffff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 20px;
        }

        /* ⚙️ Settings ခလုတ် */
        .btn-settings {
            background: #ffffff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 20px;
        }
        
        /* iOS Style Settings Panel */
        .settings-panel {
            display: none;
            position: fixed;
            top: 75px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 9998;
            width: 260px;
            font-size: 13px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .settings-panel h4 { margin: 0 0 10px 0; color: #2b2d42; border-bottom: 1px solid #eee; padding-bottom: 5px; text-align: center;}
        .audio-group { margin-bottom: 10px; text-align: left; }
        .audio-group label { display: block; margin-bottom: 3px; font-weight: bold; color: #555; }
        .audio-group input { width: 100%; font-size: 11px; }
        .status-msg { font-size: 11px; color: #28a745; margin-top: 5px; display: none; text-align: center; font-weight: bold;}

        /* 🔒 iOS Style Password Pop-up Box */
        .ios-alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .ios-alert {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 270px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: popUp 0.2s ease-out;
        }
        @keyframes popUp {
            0% { transform: scale(1.1); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .ios-alert-title { font-weight: 600; font-size: 17px; margin-top: 18px; color: #000; }
        .ios-alert-text { font-size: 13px; margin: 4px 16px 14px 16px; color: #000; }
        .ios-alert-input {
            width: 80%; padding: 6px; border: 1px solid rgba(0,0,0,0.2); border-radius: 6px;
            font-size: 14px; text-align: center; margin-bottom: 16px; outline: none; background: #fff;
        }
        .ios-alert-buttons { display: flex; border-top: 0.5px solid rgba(0,0,0,0.2); }
        .ios-alert-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            font-size: 17px; color: #007ff5; cursor: pointer; outline: none;
        }
        .ios-alert-btn.cancel { border-right: 0.5px solid rgba(0,0,0,0.2); }
        .ios-alert-btn.confirm { font-weight: 600; }

        .gif-container {
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            width: 180px;  
            height: 180px; 
            display: block;
        }

        #waiting-gif-box { display: block; }
        .gif-surprise { display: none; }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            color: #2b2d42;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }

        .result-text {
            display: none; 
            font-size: 17px;
            font-weight: bold;
            margin-top: 25px; 
            line-height: 1.6;
        }

        #sweet-text { color: #ff758c; }
        #joke-text { color: #e60033; }

        .btn-outline {
            background: #ffffff;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-main { border: 2px solid #0056b3; color: #0056b3; }
        .buttons-row { display: flex; gap: 15px; justify-content: center; width: 100%; margin-top: 10px; }
        .btn-love { border: 2px solid #007bff; color: #007bff; }
        .btn-not-love { border: 2px solid #6c757d; color: #6c757d; }

        .btn-outline:active {
            transform: scale(0.95);
        }

        .particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatOutSlow 1.5s forwards;
            z-index: 1000;
        }
        @keyframes floatOutSlow {
            0% { transform: scale(0.5); opacity: 0; }
            15% { opacity: 1; transform: scale(1.2); }
            100% { transform: translate(var(--x), var(--y)) scale(0.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <button type="button" class="btn-settings" onclick="openPasswordAlert()" title="သီချင်းရွေးရန်">⚙️</button>
        <button type="button" class="btn-home" id="home-button" onclick="goBackToMain()" title="ပင်မစာမျက်နှာသို့">🏡</button>
    </div>

    <div class="ios-alert-overlay" id="pwd-overlay">
        <div class="ios-alert">
            <div class="ios-alert-title">စကားဝှက် လိုအပ်သည်</div>
            <div class="ios-alert-text">ဆက်တင်ကိုဖွင့်ရန် စကားဝှက်ရိုက်ထည့်ပါ။</div>
            <input type="password" id="pwd-input" class="ios-alert-input" placeholder="••••">
            <div class="ios-alert-buttons">
                <button type="button" class="ios-alert-btn cancel" onclick="closePasswordAlert()">ပယ်ဖျက်</button>
                <button type="button" class="ios-alert-btn confirm" onclick="checkPassword()">ဝင်မည်</button>
            </div>
        </div>
    </div>

    <div class="settings-panel" id="settings-panel">
        <h4>သီချင်းရွေးချယ်ရန် 🎵</h4>
        <div class="audio-group">
            <label>ပင်မနောက်ခံသီချင်း:</label>
            <input type="file" accept="audio/*" onchange="saveAudioToLocal(this, 'main')">
        </div>
        <div class="audio-group">
            <label>"အရမ်းချစ်တယ်" သီချင်း:</label>
            <input type="file" accept="audio/*" onchange="saveAudioToLocal(this, 'love')">
        </div>
        <div class="audio-group">
            <label>"မချစ်ဖူး" သီချင်း:</label>
            <input type="file" accept="audio/*" onchange="saveAudioToLocal(this, 'not-love')">
        </div>
        <div class="status-msg" id="upload-status">ဖုန်းထဲသို့ မှတ်သားပြီးပါပြီ! 💾</div>
    </div>

    <audio id="audio-main" loop></audio>
    <audio id="audio-love"></audio>
    <audio id="audio-not-love"></audio>

    <div class="wrapper">
        <div class="page-section" id="main-section">
            <div class="gif-container">
                <div class="tenor-gif-embed" data-postid="7562928744613497012" data-width="100%"></div>
            </div>
            <div class="question-text">ကျွန်တော်ခဗျားလေးကိုမေးစရာရှိလို့...</div>
            <button type="button" class="btn-outline btn-main" onclick="showLoveButtons()">ဘာမေးမှာလဲ နှိပ်ကြည့်မယ်</button>
        </div>

        <div class="page-section" id="love-box">
            <div class="gif-container" id="waiting-gif-box">
                <div class="tenor-gif-embed" data-postid="14531661802041862698" data-width="100%"></div>
            </div>
            <div class="gif-container gif-surprise" id="happy-gif-box">
                <div class="tenor-gif-embed" data-postid="8604663346218614199" data-width="100%"></div>
            </div>
            <div class="gif-container gif-surprise" id="sad-gif-box">
                <div class="tenor-gif-embed" data-postid="4822939937925547997" data-width="100%"></div>
            </div>
            
            <div class="buttons-row" id="choice-buttons">
                <button type="button" class="btn-outline btn-love" onclick="playLoveEffect(event)">အရမ်းချစ်တယ်</button>
                <button type="button" class="btn-outline btn-not-love" onclick="playAngryEffect(event)">မချစ်ဖူး</button>
            </div>

            <div class="result-text" id="sweet-text">တစ်သက်လုံး ထာဝရချစ်သွားမှာပါ ချစ်ရတဲ့သူလေးရယ် 🥰💖</div>
            <div class="result-text" id="joke-text">မချစ်ဖူးနှိပ်တယ်ပေါ့ ပါရိုက်ခံချင်နေတာလား 😤👊</div>
        </div>
    </div>

    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

    <script>
        // 🔑 စကားဝှက် သတ်မှတ်ချက်
        const MASTER_PASSWORD = "1234";

        const mainSection = document.getElementById('main-section');
        const loveBox = document.getElementById('love-box');
        const waitingGif = document.getElementById('waiting-gif-box');
        const happyGif = document.getElementById('happy-gif-box');
        const sadGif = document.getElementById('sad-gif-box');
        const choiceButtons = document.getElementById('choice-buttons');
        const sweetText = document.getElementById('sweet-text');
        const jokeText = document.getElementById('joke-text');
        const homeButton = document.getElementById('home-button');
        const settingsPanel = document.getElementById('settings-panel');
        const uploadStatus = document.getElementById('upload-status');
        const pwdOverlay = document.getElementById('pwd-overlay');
        const pwdInput = document.getElementById('pwd-input');

        const audioMain = document.getElementById('audio-main');
        const audioLove = document.getElementById('audio-love');
        const audioNotLove = document.getElementById('audio-not-love');

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('local_audio_main')) audioMain.src = localStorage.getItem('local_audio_main');
            if(localStorage.getItem('local_audio_love')) audioLove.src = localStorage.getItem('local_audio_love');
            if(localStorage.getItem('local_audio_not-love')) audioNotLove.src = localStorage.getItem('local_audio_not-love');
        });

        // 🔒 Password Modal Control
        function openPasswordAlert() {
            pwdInput.value = '';
            settingsPanel.style.display = 'none'; // ဆက်တင်ပန်နယ်ဟောင်း ဖွင့်ထားရင် ပိတ်ပစ်မယ်
            pwdOverlay.style.display = 'flex';
            pwdInput.focus();
        }

        function closePasswordAlert() {
            pwdOverlay.style.display = 'none';
        }

        function checkPassword() {
            if (pwdInput.value === MASTER_PASSWORD) {
                closePasswordAlert();
                settingsPanel.style.display = 'block';
            } else {
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
                pwdInput.value = '';
            }
        }

        function showLoveButtons() {
            mainSection.style.display = 'none';
            loveBox.style.display = 'flex';
            waitingGif.style.display = 'block';
            happyGif.style.display = 'none';
            sadGif.style.display = 'none';
            choiceButtons.style.display = 'flex';
            sweetText.style.display = 'none';
            jokeText.style.display = 'none';
            homeButton.style.display = 'none';
            if(audioMain.src) { audioMain.currentTime = 0; audioMain.play().catch(e => {}); }
        }

        function goBackToMain() {
            loveBox.style.display = 'none';
            mainSection.style.display = 'flex';
            homeButton.style.display = 'none'; 
            audioLove.pause(); audioNotLove.pause();
            if(audioMain.src) audioMain.play().catch(e => {});
        }

        function playLoveEffect(e) {
            waitingGif.style.display = 'none'; 
            sadGif.style.display = 'none'; 
            jokeText.style.display = 'none';   
            
            happyGif.style.display = 'block'; 
            sweetText.style.display = 'block'; 
            homeButton.style.display = 'flex'; 
            
            audioMain.pause(); audioNotLove.pause();
            if(audioLove.src) { audioLove.currentTime = 0; audioLove.play().catch(e => {}); }
            createHearts(e);
        }

        function playAngryEffect(e) {
            waitingGif.style.display = 'none'; 
            happyGif.style.display = 'none'; 
            sweetText.style.display = 'none'; 
            
            sadGif.style.display = 'block';  
            jokeText.style.display = 'block'; 
            homeButton.style.display = 'flex'; 
            
            audioMain.pause(); audioLove.pause();
            if(audioNotLove.src) { audioNotLove.currentTime = 0; audioNotLove.play().catch(e => {}); }
        }

        function createHearts(e) {
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.classList.add('particle'); p.innerText = '💖';
                p.style.left = (e.clientX || window.innerWidth / 2) + 'px'; 
                p.style.top = (e.clientY || window.innerHeight / 2) + 'px';
                p.style.setProperty('--x', (Math.random() - 0.5) * 250 + 'px');
                p.style.setProperty('--y', (Math.random() - 0.5) * 250 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        function saveAudioToLocal(input, trackType) {
            if (!input.files || !input.files[0]) return;
            
            uploadStatus.style.display = 'block';
            uploadStatus.innerText = "သိမ်းဆည်းနေပါသည်... 💾";

            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const base64Audio = e.target.result;
                try {
                    localStorage.setItem('local_audio_' + trackType, base64Audio);
                    
                    if (trackType === 'main') audioMain.src = base64Audio;
                    if (trackType === 'love') audioLove.src = base64Audio;
                    if (trackType === 'not-love') audioNotLove.src = base64Audio;

                    uploadStatus.innerText = "မှတ်သားပြီးပါပြီ! 🎉";
                    setTimeout(() => {
                        uploadStatus.style.display = 'none';
                        settingsPanel.style.display = 'none'; // သီချင်းရွေးပြီးရင် ပိတ်လိုက်မယ်
                    }, 1500);
                } catch (error) {
                    uploadStatus.innerText = "ဖိုင်ကြီးလွန်းပါသည် (၅ MB အောက်သုံးပါ)";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
