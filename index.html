<!DOCTYPE html>
<html>
<head>
    <style>
        .sticker-btn { margin: 5px; padding: 10px; cursor: pointer; }
        #display-area { margin-top: 20px; }
        img { width: 150px; height: 150px; }
    </style>
</head>
<body>

    <h2>စတစ်ကာများကို ရွေးချယ်ပါ</h2>
    
    <button class="sticker-btn" onclick="showSticker('https://i.imgur.com/example1.png')">စတစ်ကာ ၁</button>
    <button class="sticker-btn" onclick="showSticker('https://i.imgur.com/example2.png')">စတစ်ကာ ၂</button>
    <button class="sticker-btn" onclick="showSticker('https://i.imgur.com/example3.png')">စတစ်ကာ ၃</button>

    <div id="display-area">
        <p>ရွေးချယ်ထားသော စတစ်ကာ:</p>
        <img id="main-sticker" src="" alt="စတစ်ကာပုံ ပေါ်လာပါမည်">
    </div>

    <script>
        function showSticker(imageUrl) {
            document.getElementById('main-sticker').src = imageUrl;
        }
    </script>
</body>
</html>
